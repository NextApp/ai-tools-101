<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1000, height=1500">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1000px; height: 1500px;
    font-family: 'Inter', -apple-system, sans-serif;
    background: linear-gradient(135deg, #004ac6 0%, #667eea 50%, #764ba2 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 60px;
    color: #fff;
    overflow: hidden;
  }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 12px 32px;
    border-radius: 50px;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 60px;
  }
  .title {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.2;
    text-align: center;
    margin-bottom: 40px;
    max-width: 800px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }
  .description {
    font-size: 28px;
    font-weight: 400;
    line-height: 1.5;
    text-align: center;
    opacity: 0.9;
    max-width: 650px;
    margin-bottom: 80px;
  }
  .brand {
    position: absolute;
    bottom: 60px;
    font-size: 22px;
    font-weight: 700;
    opacity: 0.8;
    letter-spacing: 1px;
  }
  .accent {
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .accent2 {
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="accent"></div>
  <div class="accent2"></div>
  <div class="badge" id="badge">AI TOOLS</div>
  <h1 class="title" id="pin-title">Article Title</h1>
  <p class="description" id="pin-desc">Article description goes here</p>
  <div class="brand">AI TOOL GUIDE</div>
</body>
</html>
